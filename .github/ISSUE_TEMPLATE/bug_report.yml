name: Bug Report
description: Report a bug to help us improve
title: '[Bug] '
labels: ['bug']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Description
        Please describe the bug clearly.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of WingetTrayUpdater are you using?
      placeholder: '1.0.0'
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please paste any relevant log entries (winget-tray.log or error.log)
      placeholder: |
        [2024-01-01 12:00:00] Error message here...

  - type: dropdown
    id: os
    attributes:
      label: Windows Version
      options:
        - Windows 11
        - Windows 10 (1809+)
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 
      options:
        - label: I have searched for similar issues
          required: true
        - label: I have provided all required information
          required: true