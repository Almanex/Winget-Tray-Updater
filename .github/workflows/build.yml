name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: 'WingetTrayUpdater'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity minimal
        continue-on-error: true

      - name: Publish
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o ./publish

      - name: Copy Assets
        run: |
          New-Item -ItemType Directory -Force -Path ./publish/Assets
          Copy-Item -Path ./Assets/icon.ico -Destination ./publish/Assets/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win-x64
          path: ./publish/${{ env.APP_NAME }}.exe
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win-x64
          path: ./release

      - name: Get tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/${{ env.APP_NAME }}.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-issue-on-release:
    name: Create Welcome Issue
    needs: release
    runs-on: ubuntu-latest
    if: github.event.action == 'published'
    
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎉 Welcome to WingetTrayUpdater!',
              body: `Thank you for downloading WingetTrayUpdater v${context.payload.release.tag_name}!

## Getting Started

1. Run \`WingetTrayUpdater.exe\`
2. Look for the 📦 icon in your system tray
3. The app will automatically check for updates

## Need Help?

- Check the [README](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/README.md)
- [Report an issue](https://github.com/${context.repo.owner}/${context.repo.repo}/issues/new)

## What's New?

${context.payload.release.body || 'Check the release notes for details!'}`
            })